<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Evidence drinků</title>
  <link rel="stylesheet" href="style.css">

  <script>
    const url = "http://lmpss3.dev.spsejecna.net/procedure.php";

    document.addEventListener("DOMContentLoaded", () => {
      const form = document.querySelector("#drinkForm");
      const peopleContainer = document.querySelector("#peopleContainer");
      const typesContainer = document.querySelector("#typesContainer");
      const statusBox = document.querySelector("#status");
      const submitBtn = document.querySelector("#submitBtn");
      const resetBtn = document.querySelector("#resetBtn");

      function showStatus(message, type = "info") {
        statusBox.textContent = message;
        statusBox.className = "status show " + type;
      }

      function clearStatus() {
        statusBox.textContent = "";
        statusBox.className = "status";
      }

      async function getPeopleList(apiUrl) {
        const res = await fetch(`${apiUrl}?cmd=getPeopleList`, {
          method: "GET",
          credentials: "include"
        });

        if (!res.ok) {
          throw new Error("Nepodařilo se načíst uživatele.");
        }

        return await res.json();
      }

      async function getTypesList(apiUrl) {
        const res = await fetch(`${apiUrl}?cmd=getTypesList`, {
          method: "GET",
          credentials: "include"
        });

        if (!res.ok) {
          throw new Error("Nepodařilo se načíst drinky.");
        }

        return await res.json();
      }

      function renderPeople(people) {
        peopleContainer.innerHTML = "";

        Object.values(people).forEach((person, index) => {
          const wrapper = document.createElement("div");
          wrapper.className = "user-option";

          const input = document.createElement("input");
          input.type = "radio";
          input.name = "user";
          input.id = `user-${person.ID}`;
          input.value = String(person.ID);
          input.required = true;

          if (index === 0) {
            input.checked = true;
          }
          const label = document.createElement("label");
          label.htmlFor = input.id;
          label.textContent = person.name;

          wrapper.appendChild(input);
          wrapper.appendChild(label);
          peopleContainer.appendChild(wrapper);
        });
      }

      function renderTypes(types) {
        typesContainer.innerHTML = "";

        Object.values(types).forEach(type => {
          const item = document.createElement("div");
          item.className = "drink-item";

          const text = document.createElement("div");
          text.innerHTML = `
            <div class="drink-name">${type.typ}</div>
            <div class="drink-subtitle">Počet vypitých kusů</div>`;

          const counter = document.createElement("div");
          counter.className = "counter";

          const minusBtn = document.createElement("button");
          minusBtn.type = "button";
          minusBtn.textContent = "-";

          const input = document.createElement("input");
          input.type = "number";
          input.min = "0";
          input.step = "1";
          input.value = "0";
          input.name = `drink-${type.ID}`;
          input.dataset.typeId = String(type.ID);

          const plusBtn = document.createElement("button");
          plusBtn.type = "button";
          plusBtn.textContent = "+";

          minusBtn.addEventListener("click", () => {
            const current = parseInt(input.value) || 0;
            input.value = Math.max(0, current - 1);
          });

          plusBtn.addEventListener("click", () => {
            const current = parseInt(input.value) || 0;
            input.value = current + 1;
          });

          counter.appendChild(minusBtn);
          counter.appendChild(input);
          counter.appendChild(plusBtn);

          item.appendChild(text);
          item.appendChild(counter);

          typesContainer.appendChild(item);
        });
      }
async function saveDrink(userId, typeId, count) {

    const params = new URLSearchParams();
    params.append("userId", userId);
    params.append("typeId", typeId);
    params.append("count", count);

    console.log("Odesílám data (Form URL Encoded):", params.toString());

    const res = await fetch(`${url}?cmd=saveDrinks`, {
        method: "POST",
        credentials: "include",
        headers: {
            
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: params.toString()
    });
    
    const text = await res.text();
    console.log("Odpověď serveru:", text);
    
    try {
        const json = JSON.parse(text);
        if (json.msg === "err") throw new Error("Server vrátil chybu");
        return json;
    } catch (e) {
        return text;
    }
}

      async function handleSubmit(event) {
        event.preventDefault();
        clearStatus();

        const user = document.querySelector("input[name='user']:checked");

        if (!user) {
          showStatus("Vyber uživatele.", "error");
          return;
        }

        const drinks = [...document.querySelectorAll("input[data-type-id]")];

        const filled = drinks
          .map(drink => ({
            id: drink.dataset.typeId,
            count: parseInt(drink.value) || 0
          }))
          .filter(drink => drink.count > 0);



        if (filled.length === 0) {
          showStatus("Zadej alespoň jeden drink.", "error");
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = "Odesílám...";

        try {
          for (const drink of filled) {
            const result = await saveDrink(user.value, drink.id, drink.count);
            console.log("Výsledek:", result);
          }

          showStatus("ok");
        } catch (error) {
          console.error("Chyba při odesílání:", error);
          showStatus("Odeslání se nepovedlo.", "error");
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = "Odeslat na server";
        }
      }

      function resetFormValues() {
        document.querySelectorAll("input[data-type-id]").forEach(input => {
          input.value = "0";
        });
        clearStatus();
      }

      async function init() {
        try {
          const [types, people] = await Promise.all([
            getTypesList(url),
            getPeopleList(url)
          ]);

          console.log("Lidé:", people);
          console.log("Drinky:", types);

          renderPeople(people);
          renderTypes(types);
        } catch (error) {
          console.error("Chyba při načítání:", error);
          peopleContainer.innerHTML = '<p class="loading">Nepodařilo se načíst uživatele.</p>';
          typesContainer.innerHTML = '<p class="loading">Nepodařilo se načíst drinky.</p>';
          showStatus("Nepodařilo se načíst data z API.", "error");
        }
      }

      form.addEventListener("submit", handleSubmit);
      resetBtn.addEventListener("click", resetFormValues);

      init();
    });
  </script>
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>Evidence drinků</h1>
    </section>

    <form id="drinkForm">
      <section class="card">
        <h2 class="section-title">1. Uživatel</h2>
        <div id="peopleContainer" class="users">
          <p class="loading">Načítám uživatele...</p>
        </div>
      </section>

      <section class="card">
        <h2 class="section-title">2. Drinky</h2>
        <div id="typesContainer" class="drink-list">
          <p class="loading">Načítám drinky...</p>
        </div>
      </section>

      <section class="actions">
        <button class="submit-btn" id="submitBtn" type="submit">Odeslat na server</button>
        <button class="ghost-btn" id="resetBtn" type="button">Vynulovat formulář</button>
        <div id="status" class="status"></div>
      </section>
    </form>
  </main>
</body>
</html>
